# Netlify — frontend only (React + Vite)
# Dashboard: Site settings → Build & deploy → Base directory: frontend
# Env var: VITE_BACKEND_URL = https://your-api.onrender.com/

[build]
  command = "npm run build"
  publish = "dist"

# React Router (SPA) — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
